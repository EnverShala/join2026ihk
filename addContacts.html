<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Add Contact</title>
    <link rel="stylesheet" href="./styles/addContacts.css">
    <link rel="stylesheet" href="./styles/addContactsResponsive.css">
    <link rel="icon" type="image/x-icon" href="./img/logo_mobile.svg" />
    <script src="./js/templates.js"></script>
    <script src="./js/firebaseDatabaseFunctions.js"></script>
    <script src="./js/navigationAndHeader.js"></script>
    <script src="./js/firebaseUserRendering.js"></script>
    <script src="./js/contacts.js"></script>
</head>
<body onload="loadAccountInitials()">
    <div class="addContactContainer addContactContainerCenter add-contact-dialog" onclick="if(event.target===this)closePopup()">
        <div class="popUpContainer popUpOpen">
            <div class="popUpBanner">
                <div class="popUpBannerContent">
                    <img class="joinLogo" src="./img/join_popup.svg" alt="">
                    <div class="banner-title-row">
                        <h1>Add contact</h1>
                        <button type="button" onclick="closePopup()" class="banner-close-btn">
                            <img src="./img/close.svg" alt="Close">
                        </button>
                    </div>
                    <p>Tasks are better with a team!</p>
                    <span class="popUpBannerContent span"></span>
                </div>
            </div>
            <div class="popUpContent">
                <div onclick="closePopup()" class="closePopUp addContactContainerCenter">
                    <img src="./img/close.svg" alt="">
                </div>
                <div class="popUpImg contactImg addContactContainerCenter">
                    <img class="contactSVG" src="./img/person_big.svg" alt="">
                </div>
                <div class="form">
                    <form id="addContactForm" novalidate onsubmit="return handleAddContact();">
                        <div class="input">
                            <input id="name" class="inputInput" type="text" placeholder="Name" onblur="validateContactField('name')" oninput="validateContactField('name')">
                            <div class="iconContainer">
                                <img src="./img/person.svg" alt="Name Icon">
                            </div>
                        </div>
                        <div id="name-error" class="input-error">Name erforderlich</div>
                        <div class="input">
                            <input id="email" class="inputInput" type="email" placeholder="Email" onblur="validateContactField('email')" oninput="validateContactField('email')">
                            <div class="iconContainer">
                                <img src="./img/mail.svg" alt="Mail Icon">
                            </div>
                        </div>
                        <div id="email-error" class="input-error">Gültige E-Mail eingeben</div>
                        <div class="input">
                            <input id="phone" class="inputInput" type="tel" placeholder="Phone" inputmode="numeric" pattern="[0-9]*" autocomplete="tel" onblur="validateContactField('phone')" oninput="filterPhoneInput(this); validateContactField('phone')" onkeypress="return /[0-9]/.test(event.key)">
                            <div class="iconContainer">
                                <img src="./img/call.svg" alt="Phone Icon">
                            </div>
                        </div>
                        <div id="phone-error" class="input-error">Nur Zahlen, 6-16 Stellen</div>
                        <div class="popUpButton">
                            <button type="button" onclick="closePopup()" class="cancelButton">
                                <p>Cancel</p>
                                <img src="./img/icon_cancel.svg" alt="">
                            </button>
                            <button type="submit" class="createContactButton">
                                <p>Create contact</p>
                                <img src="./img/check.svg" alt="">
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
