<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Edit Contacts</title>
    <link rel="stylesheet" href="./styles/editContacts.css">
    <link rel="stylesheet" href="./styles/editContactsResponsive.css">
    <link rel="icon" type="image/x-icon" href="./img/logo_mobile.svg" />
    <script src="./js/templates.js"></script>
    <script src="./js/firebaseDatabaseFunctions.js"></script>
    <script src="./js/firebaseUserRendering.js"></script>
    <script src="./js/contacts.js"></script>
</head>
<body>
    <div class="addContactContainer addContactContainerCenter" onclick="if(event.target===this)closePopup()">
        <div class="popUpContainer popUpOpen">
            <div class="popUpBanner">
                <div class="popUpBannerContent">
                    <img class="joinPopupImg" src="./img/join_popup.svg" alt="">
                    <div class="banner-title-row">
                        <h1>Edit contact</h1>
                        <button type="button" onclick="closePopup()" class="banner-close-btn">
                            <img src="./img/close.svg" alt="Close">
                        </button>
                    </div>
                    <span class="popUpBannerContent span"></span>
                </div>
            </div>
            <div class="popUpContent">
                <div onclick="closePopup()" class="closePopUp addContactContainerCenter">
                    <img src="./img/close.svg" alt="">
                </div>
                <div class="popUpImg contactImg addContactContainerCenter">
                    <img class="personImgOnPopUp" src="./img/person_big.svg" alt="">
                </div>
                <div class="form">
                    <form id="editContactForm" novalidate onsubmit="return handleEditContact();">
                        <div class="input">
                            <input id="name" class="inputInput" type="text" placeholder="Name" onblur="validateContactField('name')" oninput="validateContactField('name')">
                            <div class="iconContainer">
                                <img src="./img/person.svg" alt="Name Icon">
                            </div>
                        </div>
                        <div id="name-error" class="input-error" style="display:none;">Bitte einen Namen eingeben.</div>
                        <div class="input">
                            <input id="email" class="inputInput" type="email" placeholder="Email" onblur="validateContactField('email')" oninput="validateContactField('email')">
                            <div class="iconContainer">
                                <img src="./img/mail.svg" alt="Mail Icon">
                            </div>
                        </div>
                        <div id="email-error" class="input-error" style="display:none;">Bitte gültige E-Mail eingeben (z.B. name@example.de).</div>
                        <div class="input">
                            <input id="phone" class="inputInput" type="tel" placeholder="Phone" onblur="validateContactField('phone')" oninput="validateContactField('phone')">
                            <div class="iconContainer">
                                <img src="./img/call.svg" alt="Phone Icon">
                            </div>
                        </div>
                        <div id="phone-error" class="input-error" style="display:none;">Bitte gültige Telefonnummer eingeben (6–16 Zeichen, nur Ziffern, +, -, ( )).</div>
                        <div class="popUpButton">
                            <button type="button" onclick="deleteUser(getUserId(users[currentUser].email))" class="cancelButton">
                                <p>Delete</p>
                                <div>
                                    <img class="crossSVG" src="./img/icon_cancel.svg" alt="">
                                </div>
                            </button>
                            <button type="submit" class="createContactButton">
                                <p>Save</p>
                                <div>
                                    <img class="checkSVG" src="./img/check.svg" alt="">
                                </div>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
